plugins {
    id 'java'
    id 'application'
    id 'org.openjfx.javafxplugin' version '0.1.0'
}

group = 'com.ngp.karaoke'
version = '1.0.0'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

repositories {
    mavenCentral()
}

dependencies {
    implementation project(':legacy-swing')
}

javafx {
    version = '21.0.1'
    modules = ['javafx.controls', 'javafx.graphics']
}

application {
    mainClass = 'karaoke.ui.fx.FxShellApp'
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}

jar {
    archiveBaseName = 'karaoke-creator-fx'
    manifest {
        attributes(
            'Main-Class': application.mainClass.get()
        )
    }
}

tasks.register('fatJar', Jar) {
    group = 'build'
    description = 'Builds an executable fat jar for the JavaFX migration app.'
    dependsOn tasks.named('jar')
    archiveBaseName = 'karaoke-creator-fx'
    archiveClassifier = 'all'
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE

    manifest {
        attributes(
            'Main-Class': application.mainClass.get()
        )
    }

    from(sourceSets.main.output)
    from {
        configurations.runtimeClasspath.collect { dependency ->
            dependency.isDirectory() ? dependency : zipTree(dependency)
        }
    }

    exclude 'META-INF/*.SF', 'META-INF/*.DSA', 'META-INF/*.RSA'
}

tasks.register('copyFatJarToRoot', Copy) {
    group = 'distribution'
    description = 'Copies the JavaFX executable fat jar to the project root.'
    dependsOn tasks.named('fatJar')
    from(tasks.named('fatJar'))
    into(rootProject.projectDir)
    rename { 'Karaoke creator FX.jar' }
}

def jpackageInputDir = layout.buildDirectory.dir('jpackage/input')
def jpackageOutputDir = layout.buildDirectory.dir('jpackage/output')

tasks.register('prepareJpackageInput', Sync) {
    group = 'distribution'
    description = 'Stages the JavaFX app jars and runtime classpath for jpackage.'
    dependsOn tasks.named('jar')
    into(jpackageInputDir)
    from(tasks.named('jar'))
    from(configurations.runtimeClasspath)
}

tasks.register('packageFxAppImage', Exec) {
    group = 'distribution'
    description = 'Builds a self-contained JavaFX app image with jpackage.'
    dependsOn tasks.named('prepareJpackageInput')

    def inputDir = jpackageInputDir.get().asFile
    def outputDir = jpackageOutputDir.get().asFile
    outputs.dir(outputDir)

    doFirst {
        outputDir.mkdirs()
        commandLine(
            'jpackage',
            '--type', 'app-image',
            '--input', inputDir.absolutePath,
            '--dest', outputDir.absolutePath,
            '--name', providers.gradleProperty('appName').get(),
            '--app-version', project.version.toString(),
            '--vendor', providers.gradleProperty('appVendor').get(),
            '--main-jar', tasks.named('jar').get().archiveFile.get().asFile.name,
            '--main-class', application.mainClass.get(),
            '--java-options', '--module-path',
            '--java-options', '$APPDIR',
            '--java-options', '--add-modules=javafx.base,javafx.graphics,javafx.controls'
        )
    }
}

tasks.register('packageFxNative', Exec) {
    group = 'distribution'
    description = 'Builds a platform-native JavaFX installer with jpackage defaults.'
    dependsOn tasks.named('prepareJpackageInput')

    def inputDir = jpackageInputDir.get().asFile
    def outputDir = jpackageOutputDir.get().asFile
    outputs.dir(outputDir)

    doFirst {
        outputDir.mkdirs()
        commandLine(
            'jpackage',
            '--input', inputDir.absolutePath,
            '--dest', outputDir.absolutePath,
            '--name', providers.gradleProperty('appName').get(),
            '--app-version', project.version.toString(),
            '--vendor', providers.gradleProperty('appVendor').get(),
            '--main-jar', tasks.named('jar').get().archiveFile.get().asFile.name,
            '--main-class', application.mainClass.get(),
            '--java-options', '--module-path',
            '--java-options', '$APPDIR',
            '--java-options', '--add-modules=javafx.base,javafx.graphics,javafx.controls'
        )
    }
}
